name: Deploy Zensical Site

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important pour les dates de modif des pages

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Zensical
        run: |
          pip install zensical

      - name: Build Website
        run: |
          zensical build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Zensical génère le site final dans un dossier nommé 'site'
          path: './site' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
